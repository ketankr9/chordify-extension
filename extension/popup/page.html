<!DOCTYPE html>
<style>
  html,
  body {
    width: 350px;
    min-height: 200px;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .hidden {
    display: none;
  }

  /* Chord popup styles */
  .chord-container {
    padding: 16px;
  }

  .chord-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #e0e0e0;
  }

  .chord-title {
    font-size: 14px;
    font-weight: 600;
    color: #0f0f0f;
    margin: 0;
  }

  .chord-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
    gap: 8px;
    justify-items: center;
    max-height: 400px;
    overflow-y: auto;
  }

  .chord-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .chord-item img {
    max-width: 100%;
    height: auto;
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .chord-item span {
    font-size: 11px;
    color: #666;
    text-align: center;
  }

  .chord-link {
    display: block;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #e0e0e0;
    text-align: center;
    color: #065fd4;
    text-decoration: none;
    font-size: 13px;
  }

  .loading {
    text-align: center;
    padding: 40px 20px;
    color: #666;
  }

  .loading-spinner {
    border: 3px solid #f3f3f3;
    border-top: 3px solid #065fd4;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .no-chords {
    text-align: center;
    padding: 40px 20px;
    color: #666;
  }
</style>
<html>
<head>
  <meta charset="utf-8">
</head>
<body>
  <!-- Chord display section -->
  <div id="chord-section" class="hidden chord-container">
    <div class="chord-header">
      <h3 class="chord-title" id="chord-title">🎸 Chords</h3>
    </div>
    <div id="chord-grid" class="chord-grid"></div>
    <a id="chordify-link" class="chord-link" target="_blank" rel="noopener noreferrer">View on Chordify.net</a>
  </div>

  <!-- Loading state -->
  <div id="loading-section" class="hidden loading">
    <div class="loading-spinner"></div>
    <div>Loading chords...</div>
  </div>

  <!-- No chords state -->
  <div id="no-chords-section" class="hidden no-chords">
    <p>No chords available for this video</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
